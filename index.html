<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Computing Midterm</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    
    <div class="app-container">
        <!-- Landing Screen -->
        <main id="landing-screen" class="screen active">
            <header class="landing-header">
                <div class="logo-glow"></div>
                <h1>Cloud Computing</h1>
                <p>Midterm Exam Preparation</p>
                <div class="stats-badge">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19h16M4 15h16M4 11h16M4 7h16"/></svg>
                    <span id="total-pool-count">Loading...</span> Premium MCQs
                </div>
            </header>

            <section class="sections-grid" id="sections-container">
                <!-- Dynamite Section Cards Injected via JS -->
                <div class="loading-state">
                    <div class="spinner"></div>
                    <span>Initializing Modules...</span>
                </div>
            </section>
        </main>

        <!-- Quiz Screen -->
        <main id="quiz-screen" class="screen">
            <header class="quiz-header glass">
                <button id="btn-back" class="btn-icon" title="Leave Exam">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                </button>
                <div class="progress-wrapper">
                    <div class="progress-labels">
                        <span id="section-title">Section 1</span>
                        <span id="question-counter">1/100</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div id="progress-bar" class="progress-bar-fill"></div>
                    </div>
                </div>
                <div class="score-badge">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
                    <span id="score-counter">0</span>
                </div>
            </header>

            <div class="quiz-content">
                <div class="question-card glass">
                    <div class="question-number" id="q-num-badge">1</div>
                    <h2 id="question-text" class="question-text">Loading Question...</h2>
                    
                    <div id="options-container" class="options-grid">
                        <!-- Options injected via JS -->
                    </div>

                    <div id="feedback-panel" class="feedback-panel hidden">
                        <div class="feedback-icon" id="feedback-icon"></div>
                        <h3 id="feedback-heading"></h3>
                        <p id="feedback-desc"></p>
                    </div>

                    <button id="btn-next" class="btn btn-primary btn-lg hidden">
                        Next Question
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </button>
                </div>
            </div>
        </main>

        <!-- Results Screen -->
        <main id="results-screen" class="screen">
            <div class="results-card glass">
                <div class="results-icon heartbeat">
                    <svg viewBox="0 0 64 64" fill="none">
                        <circle cx="32" cy="32" r="28" stroke="url(#gradient-success)" stroke-width="4" fill="none"/>
                        <path d="M20 32l8 8 16-16" stroke="url(#gradient-success)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
                        <defs>
                            <linearGradient id="gradient-success" x1="0" y1="0" x2="64" y2="64">
                                <stop stop-color="#34D399" />
                                <stop offset="1" stop-color="#10B981" />
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                
                <h1 class="results-title">Section Complete!</h1>
                
                <div class="score-ring">
                    <svg viewBox="0 0 160 160">
                        <circle cx="80" cy="80" r="70" class="ring-bg"/>
                        <circle cx="80" cy="80" r="70" class="ring-progress" id="score-ring"/>
                    </svg>
                    <div class="score-ring-content">
                        <span class="final-score" id="final-score">0</span>
                        <span class="score-divider">/</span>
                        <span class="total-score" id="final-total">0</span>
                    </div>
                </div>

                <p id="performance-msg" class="performance-msg">Great job!</p>

                <div class="stats-row">
                    <div class="stat-pill success">
                        <span class="stat-val" id="stat-correct">0</span> Correct
                    </div>
                    <div class="stat-pill error">
                        <span class="stat-val" id="stat-incorrect">0</span> Incorrect
                    </div>
                </div>

                <div class="actions-row">
                    <button id="btn-retry" class="btn btn-secondary">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/></svg>
                        Retry
                    </button>
                    <button id="btn-home" class="btn btn-primary">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><path d="M9 22V12h6v10"/></svg>
                        Home
                    </button>
                </div>
            </div>
            <div id="confetti" class="confetti"></div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
