<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Computing Midterm Exam</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">

        <!-- ========== LANDING SCREEN ========== -->
        <div id="landing-screen" class="screen active">
            <div class="landing-content" style="text-align: center;">
                <h1 class="app-title" style="font-size: 3rem; margin-bottom: 2rem;">Cloud Computing</h1>
                <p class="app-subtitle" style="font-size: 1.5rem; margin-bottom: 3rem;">Midterm Exam Preparation</p>

                <button id="start-exam-btn" class="btn btn-primary" style="font-size: 1.5rem; padding: 1rem 3rem;">
                    Start Exam
                </button>
            </div>
            <div class="floating-shapes">
                <div class="shape shape-1"></div>
                <div class="shape shape-2"></div>
                <div class="shape shape-3"></div>
            </div>
        </div>

        <!-- ========== MCQ QUIZ SCREEN ========== -->
        <div id="mcq-screen" class="screen">
            <header class="quiz-header">
                <button id="mcq-back-btn" class="btn btn-icon" title="Back to Home">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7" />
                    </svg>
                </button>
                <div class="progress-info">
                    <span id="mcq-section-title" class="header-label">Exam Mode</span>
                    <div class="progress-container">
                        <div id="mcq-progress-bar" class="progress-bar"></div>
                    </div>
                    <span id="mcq-counter" class="question-counter">1/x</span>
                </div>
                <div class="score-badge">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
                    </svg>
                    <span id="mcq-score">0</span>
                </div>
            </header>
            <main class="quiz-main">
                <div class="question-card">
                    <div class="question-number"><span id="mcq-q-num">1</span></div>
                    <h2 id="mcq-question" class="question-text">Loading...</h2>
                    <div id="mcq-options" class="options-container"></div>
                    <div id="mcq-feedback" class="feedback-container hidden">
                        <div id="mcq-feedback-icon" class="feedback-icon"></div>
                        <p id="mcq-feedback-text" class="feedback-text"></p>
                        <p id="mcq-explanation" class="explanation-text"></p>
                    </div>
                </div>
            </main>
            <footer class="quiz-footer">
                <button id="mcq-next-btn" class="btn btn-primary hidden">
                    <span>Next Question</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M5 12h14M12 5l7 7-7 7" />
                    </svg>
                </button>
            </footer>
        </div>

        <!-- ========== RESULTS SCREEN ========== -->
        <div id="results-screen" class="screen">
            <div class="results-content">
                <div class="results-header">
                    <div class="results-icon">
                        <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <circle cx="32" cy="32" r="28" stroke="url(#tg)" stroke-width="3" fill="none" />
                            <path d="M32 16L36 28H48L38 36L42 48L32 40L22 48L26 36L16 28H28L32 16Z" fill="url(#tg)" />
                            <defs>
                                <linearGradient id="tg" x1="8" y1="8" x2="56" y2="56">
                                    <stop offset="0%" stop-color="#F59E0B" />
                                    <stop offset="100%" stop-color="#EF4444" />
                                </linearGradient>
                            </defs>
                        </svg>
                    </div>
                    <h2 class="results-title">Exam Complete!</h2>
                </div>
                <div class="score-circle">
                    <svg viewBox="0 0 120 120">
                        <circle cx="60" cy="60" r="54" stroke="#e2e8f0" stroke-width="8" fill="none" />
                        <circle id="score-circle-progress" cx="60" cy="60" r="54" stroke="url(#sg)" stroke-width="8"
                            fill="none" stroke-linecap="round" stroke-dasharray="339.292"
                            stroke-dashoffset="339.292" />
                        <defs>
                            <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#6366F1" />
                                <stop offset="100%" stop-color="#06B6D4" />
                            </linearGradient>
                        </defs>
                    </svg>
                    <div class="score-text">
                        <span id="final-score">0</span>
                        <span class="score-divider">/</span>
                        <span id="total-questions">0</span>
                    </div>
                </div>
                <p id="results-message" class="results-message">Great job!</p>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon correct">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                <path d="M20 6L9 17l-5-5" />
                            </svg>
                        </div>
                        <div class="stat-info">
                            <span id="correct-count" class="stat-value">0</span>
                            <span class="stat-label">Correct</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon incorrect">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                                <path d="M18 6L6 18M6 6l12 12" />
                            </svg>
                        </div>
                        <div class="stat-info">
                            <span id="incorrect-count" class="stat-value">0</span>
                            <span class="stat-label">Incorrect</span>
                        </div>
                    </div>
                </div>
                <div class="results-actions">
                    <button id="retry-btn" class="btn btn-secondary">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 4v6h6M23 20v-6h-6" />
                            <path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15" />
                        </svg>
                        <span>Retry</span>
                    </button>
                    <button id="home-btn" class="btn btn-primary">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" />
                            <path d="M9 22V12h6v10" />
                        </svg>
                        <span>Home</span>
                    </button>
                </div>
            </div>
            <div class="confetti" id="confetti"></div>
        </div>

    </div>
    <script src="app.js"></script>
</body>

</html>
